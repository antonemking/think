services:
  think:
    build: .
    ports:
      - "3100:3100"
    volumes:
      - ./data:/app/data
    environment:
      - THINK_DATA_DIR=/app/data
    restart: always

  syncthing:
    image: syncthing/syncthing:latest
    hostname: think-sync
    ports:
      - "8384:8384"   # Web UI
      - "22000:22000/tcp" # Sync protocol
      - "22000:22000/udp"
      - "21027:21027/udp" # Discovery
    volumes:
      - ./data:/var/syncthing/ThinkCanvas
      - ./.syncthing-config:/var/syncthing/config
    restart: always
